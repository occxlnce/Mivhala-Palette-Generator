    <div id="toast" class="toast" vid="95">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" vid="96"><polyline points="20 6 9 17 4 12" vid="97"></polyline></svg>
        <span id="toast-msg" vid="98">Copied to clipboard!</span>

    <script vid="99">
        // --- State ---
        const state = {
            harmony: 'Complementary',
            baseHue: 94,
            satVar: 65,
            lightSpread: 60,
            palette: Array(5).fill().map(() => ({ h: 0, s: 0, l: 0, hex: '', locked: false }))
        };

        // --- DOM Elements ---
        const grid = document.getElementById('palette-grid');
        const sliderHue = document.getElementById('slider-hue');
        const sliderSat = document.getElementById('slider-sat');
        const sliderLight = document.getElementById('slider-light');
        const valHue = document.getElementById('val-hue');
        const valSat = document.getElementById('val-sat');
        const valLight = document.getElementById('val-light');
        const tabs = document.querySelectorAll('.harmony-tab');
        const blobs = Array(5).fill().map((_, i) => document.getElementById(`blob-${i}`));
        
        // --- SVG Icons ---
        const iconLockOpen = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`;
        const iconLockClosed = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>`; // Visually distinct for locked state

        // --- Initialization ---
        function init() {
            // Build Grid HTML
            grid.innerHTML = state.palette.map((_, i) => `
                <div class="swatch-card" id="card-${i}">
                    <button class="lock-btn" id="lock-${i}" onclick="toggleLock(${i})" title="Lock color">
                        ${iconLockOpen}
                    </button>
                    <div class="color-fill" id="fill-${i}" onclick="copyColor(${i})" title="Click to copy HEX">
                        <div class="copy-overlay">
                            <span class="bg-black/50 text-white px-3 py-1.5 rounded-full text-xs font-medium flex items-center gap-1.5">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                                Copy
                            </span>
                        </div>
                    </div>
                    <div class="color-details">
                        <span class="monospace text-[15px] font-bold tracking-wide" id="hex-${i}">#000000</span>
                        <span class="monospace text-xs text-white/60" id="hsl-${i}">0° · 0% · 0%</span>
                    </div>
                </div>
            `).join('');

            updatePalette();
            setupEventListeners();
        }

        // --- Core Logic ---
        function hslToHex(h, s, l) {
            l /= 100;
            const a = s * Math.min(l, 1 - l) / 100;
            const f = n => {
                const k = (n + h / 30) % 12;
                const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
            };
            return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
        }

        function calculateColors(baseH, sat, light, type) {
            const addHue = (val) => (baseH + val + 360) % 360;
            const clamp = (val) => Math.max(0, Math.min(100, val));
            
            // Using sat and light as the base values to derive the palette, 
            // responding to the text prompt's "Variance/Spread" concept by 
            // applying them to variations.
            
            let res = [];
            switch (type) {
                case 'Analogous':
                    res = [
                        { h: addHue(-30), s: sat, l: light },
                        { h: addHue(-15), s: clamp(sat-10), l: clamp(light+10) },
                        { h: baseH, s: sat, l: light },
                        { h: addHue(15), s: clamp(sat-10), l: clamp(light-10) },
                        { h: addHue(30), s: sat, l: light }
                    ]; break;
                case 'Complementary':
                    res = [
                        { h: baseH, s: sat, l: light },
                        { h: addHue(180), s: clamp(sat-15), l: clamp(light+10) },
                        { h: addHue(30), s: sat, l: clamp(light-10) },
                        { h: addHue(210), s: clamp(sat-15), l: clamp(light+20) },
                        { h: addHue(180), s: sat, l: clamp(light-5) }
                    ]; break;
                case 'Triadic':
                    res = [
                        { h: baseH, s: sat, l: light },
                        { h: addHue(120), s: sat, l: light },
                        { h: addHue(240), s: sat, l: light },
                        { h: addHue(120), s: clamp(sat-15), l: clamp(light+15) },
                        { h: addHue(240), s: clamp(sat-15), l: clamp(light-15) }
                    ]; break;
                case 'Split Comp.':
                    res = [
                        { h: baseH, s: sat, l: light },
                        { h: addHue(150), s: sat, l: light },
                        { h: addHue(210), s: sat, l: light },
                        { h: addHue(150), s: clamp(sat-20), l: clamp(light+15) },
                        { h: addHue(210), s: clamp(sat-20), l: clamp(light-15) }
                    ]; break;
                case 'Mono':
                    res = [
                        { h: baseH, s: sat, l: clamp(light+30) },
                        { h: baseH, s: clamp(sat-15), l: clamp(light+15) },
                        { h: baseH, s: sat, l: light },
                        { h: baseH, s: clamp(sat+15), l: clamp(light-15) },
                        { h: baseH, s: sat, l: clamp(light-30) }
                    ]; break;
                case 'Tetradic':
                    res = [
                        { h: baseH, s: sat, l: light },
                        { h: addHue(90), s: sat, l: light },
                        { h: addHue(180), s: sat, l: light },
                        { h: addHue(270), s: sat, l: light },
                        { h: addHue(90), s: clamp(sat-20), l: clamp(light+15) }
                    ]; break;
            }
            return res.map(c => ({ h: Math.round(c.h), s: Math.round(c.s), l: Math.round(c.l) }));
        }

        function updatePalette() {
            const newColors = calculateColors(state.baseHue, state.satVar, state.lightSpread, state.harmony);
            
            newColors.forEach((color, i) => {
                if (!state.palette[i].locked) {
                    state.palette[i] = {
                        ...color,
                        hex: hslToHex(color.h, color.s, color.l),
                        locked: false
                    };
                }
            });

            renderPalette();
        }

        function renderPalette() {
            state.palette.forEach((c, i) => {
                // Update Card
                document.getElementById(`fill-${i}`).style.backgroundColor = c.hex;
                document.getElementById(`hex-${i}`).textContent = c.hex;
                document.getElementById(`hsl-${i}`).textContent = `${c.h}° · ${c.s}% · ${c.l}%`;
                
                // Update Lock UI
                const lockBtn = document.getElementById(`lock-${i}`);
                if (c.locked) {
                    lockBtn.classList.add('locked');
                    lockBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0"></path></svg>`;
                } else {
                    lockBtn.classList.remove('locked');
                    lockBtn.innerHTML = iconLockOpen;
                }

                // Update Background Blob
                if (blobs[i]) {
                    blobs[i].style.backgroundColor = c.hex;
                }
            });
        }

        // --- Interactions ---
        function handleGenerate() {
            state.baseHue = Math.floor(Math.random() * 360);
            sliderHue.value = state.baseHue;
            valHue.textContent = `${state.baseHue}°`;
            
            // Sync mobile slider if it exists
            const sliderHueMobile = document.getElementById('slider-hue-mobile');
            const valHueMobile = document.getElementById('val-hue-mobile');
            if (sliderHueMobile) {
                sliderHueMobile.value = state.baseHue;
                valHueMobile.textContent = `${state.baseHue}°`;
            }
            
            updatePalette();
        }

        function toggleLock(index) {
            state.palette[index].locked = !state.palette[index].locked;
            renderPalette();
        }

        function copyColor(index) {
            const hex = state.palette[index].hex;
            const card = document.getElementById(`card-${index}`);
            
            // Toggle details visibility
            card.classList.toggle('show-details');
            
            // Copy to clipboard
            navigator.clipboard.writeText(hex).then(() => {
                showToast(`Copied ${hex}`);
                
                // Auto-hide details after 2 seconds
                setTimeout(() => {
                    card.classList.remove('show-details');
                }, 2000);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function toggleDropdown(type) {
            const content = document.getElementById(`${type}-content`);
            const arrow = document.getElementById(`${type}-arrow`);
            
            if (content.classList.contains('hidden')) {
                // Close all other dropdowns
                ['hue', 'sat', 'light'].forEach(t => {
                    if (t !== type) {
                        document.getElementById(`${t}-content`).classList.add('hidden');
                        document.getElementById(`${t}-arrow`).style.transform = 'rotate(0deg)';
                    }
                });
                
                // Open this dropdown
                content.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                // Close this dropdown
                content.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        function setupEventListeners() {
            // Desktop Sliders
            sliderHue.addEventListener('input', (e) => {
                state.baseHue = parseInt(e.target.value);
                valHue.textContent = `${state.baseHue}°`;
                updatePalette();
            });
            sliderSat.addEventListener('input', (e) => {
                state.satVar = parseInt(e.target.value);
                valSat.textContent = `${state.satVar}%`;
                updatePalette();
            });
            sliderLight.addEventListener('input', (e) => {
                state.lightSpread = parseInt(e.target.value);
                valLight.textContent = `${state.lightSpread}%`;
                updatePalette();
            });

            // Mobile Sliders
            const sliderHueMobile = document.getElementById('slider-hue-mobile');
            const sliderSatMobile = document.getElementById('slider-sat-mobile');
            const sliderLightMobile = document.getElementById('slider-light-mobile');
            const valHueMobile = document.getElementById('val-hue-mobile');
            const valSatMobile = document.getElementById('val-sat-mobile');
            const valLightMobile = document.getElementById('val-light-mobile');

            if (sliderHueMobile) {
                sliderHueMobile.addEventListener('input', (e) => {
                    state.baseHue = parseInt(e.target.value);
                    sliderHue.value = state.baseHue;
                    valHue.textContent = `${state.baseHue}°`;
                    valHueMobile.textContent = `${state.baseHue}°`;
                    updatePalette();
                });
            }

            if (sliderSatMobile) {
                sliderSatMobile.addEventListener('input', (e) => {
                    state.satVar = parseInt(e.target.value);
                    sliderSat.value = state.satVar;
                    valSat.textContent = `${state.satVar}%`;
                    valSatMobile.textContent = `${state.satVar}%`;
                    updatePalette();
                });
            }

            if (sliderLightMobile) {
                sliderLightMobile.addEventListener('input', (e) => {
                    state.lightSpread = parseInt(e.target.value);
                    sliderLight.value = state.lightSpread;
                    valLight.textContent = `${state.lightSpread}%`;
                    valLightMobile.textContent = `${state.lightSpread}%`;
                    updatePalette();
                });
            }

            // Tabs
            tabs.forEach(tab => {
                tab.addEventListener('click', (e) => {
                    // Update UI
                    tabs.forEach(t => {
                        t.classList.remove('active');
                    });
                    tab.classList.add('active');
                    
                    // Update State
                    state.harmony = tab.dataset.harmony;
                    updatePalette();
                });
            });

            // Spacebar
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !document.querySelector('.modal-overlay.active')) {
                    e.preventDefault();
                    handleGenerate();
                }
            });

            // Export Tabs
            document.querySelectorAll('.export-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    document.querySelectorAll('.export-tab').forEach(t => {
                        t.classList.remove('bg-white/10', 'text-white', 'font-medium');
                        t.classList.add('text-white/60');
                    });
                    e.target.classList.remove('text-white/60');
                    e.target.classList.add('bg-white/10', 'text-white', 'font-medium');
                    
                    generateExportCode(e.target.dataset.target);
                    document.getElementById('export-title').textContent = e.target.textContent;
                });
            });
        }

        // --- Export Functions ---
        const modal = document.getElementById('export-modal');
        const codeArea = document.getElementById('export-code');

        function openModal() {
            modal.classList.add('active');
            generateExportCode('css'); // Default tab
            
            // Reset tabs visually
            document.querySelectorAll('.export-tab').forEach(t => {
                t.classList.remove('bg-white/10', 'text-white', 'font-medium');
                t.classList.add('text-white/60');
            });
            document.querySelector('[data-target="css"]').classList.add('bg-white/10', 'text-white', 'font-medium');
            document.getElementById('export-title').textContent = 'CSS Variables';
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        function generateExportCode(type) {
            let code = '';
            const colors = state.palette;
            
            if (type === 'css') {
                code = `:root {\n`;
                colors.forEach((c, i) => code += `  --color-${i + 1}: ${c.hex};\n`);
                code += `}`;
            } else if (type === 'tailwind') {
                code = `module.exports = {\n  theme: {\n    extend: {\n      colors: {\n`;
                code += `        brand: {\n`;
                colors.forEach((c, i) => code += `          ${(i+1)*100}: '${c.hex}',\n`);
                code += `        }\n      }\n    }\n  }\n}`;
            } else if (type === 'scss') {
                colors.forEach((c, i) => code += `$color-${i + 1}: ${c.hex};\n`);
            }
            
            codeArea.value = code;
        }

        function copyCode() {
            codeArea.select();
            navigator.clipboard.writeText(codeArea.value).then(() => {
                showToast('Code copied!');
            });
        }

        function exportPNG() {
            const canvas = document.createElement('canvas');
            canvas.width = 1200;
            canvas.height = 800;
            const ctx = canvas.getContext('2d');
            
            // Background
            ctx.fillStyle = '#0f0f13';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const cardWidth = 200;
            const gap = 24;
            const totalWidth = (cardWidth * 5) + (gap * 4);
            const startX = (canvas.width - totalWidth) / 2;
            const startY = 200;

            // Title
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 32px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(`Chromatic Palette - ${state.harmony}`, canvas.width/2, 100);

            // Cards
            state.palette.forEach((c, i) => {
                const x = startX + i * (cardWidth + gap);
                
                // Card bg
                ctx.fillStyle = '#1a1a1a';
                ctx.beginPath();
                ctx.roundRect(x, startY, cardWidth, 400, 16);
                ctx.fill();

                // Color fill
                ctx.fillStyle = c.hex;
                ctx.beginPath();
                ctx.roundRect(x, startY, cardWidth, 300, [16, 16, 0, 0]);
                ctx.fill();

                // Text
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px monospace';
                ctx.textAlign = 'left';
                ctx.fillText(c.hex, x + 20, startY + 340);
                
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.font = '14px monospace';
                ctx.fillText(`${c.h}° · ${c.s}% · ${c.l}%`, x + 20, startY + 370);
            });

            const link = document.createElement('a');
            link.download = `chromatic-palette.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        function exportPDF() {
            const win = window.open('', '_blank');
            const html = `
                
                <html>
                <head>
                    <title>Chromatic Palette</title>
                    <style>
                        body { font-family: -apple-system, sans-serif; padding: 40px; background: #fff; color: #000; }
                        h1 { margin-bottom: 40px; font-size: 24px; color: #333; }
                        .grid { display: flex; gap: 20px; }
                        .card { flex: 1; border: 1px solid #eee; border-radius: 12px; overflow: hidden; page-break-inside: avoid; }
                        .color { height: 200px; width: 100%; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                        .details { padding: 16px; background: #f9f9f9; }
                        .hex { font-family: monospace; font-size: 18px; font-weight: bold; margin-bottom: 4px; display: block; }
                        .hsl { font-family: monospace; font-size: 12px; color: #666; }
                        @media print {
                            @page { margin: 1cm; }
                            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                        }
                    </style>
                </head>
                <body>
                    <h1>Chromatic Palette - ${state.harmony}</h1>
                    <div class="grid">
                        ${state.palette.map(c => `
                            <div class="card">
                                <div class="color" style="background-color: ${c.hex}"></div>
                                <div class="details">
                                    <span class="hex">${c.hex}</span>
                                    <span class="hsl">${c.h}° · ${c.s}% · ${c.l}%</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <script>
                        window.onload = () => { window.print(); };
                    <\/script>
                </body>
                </html>
            `;
            win.document.write(html);
            win.document.close();
        }

        // Run
        init();
    </script>
